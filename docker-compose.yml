services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=hkr-fullstack
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: casinoapp-api:latest
    environment:
      - API_PORT=${API_PORT:-4000}
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/hkr-fullstack?sslmode=disable
      - JWT_ACCESS_SECRET=myverysecretkey
      - JWT_REFRESH_SECRET=myotherverysecretkey
      - JWT_ACCESS_TTL=900
      - JWT_REFRESH_TTL=604800
      - ALLOWED_ORIGINS=https://casino.biganimetitti.es
    depends_on:
      - postgres

  web-public:
    image: casinoapp-web-public:latest
    environment:
      - PORT=${WEB_PUBLIC_PORT:-5000}
      - VITE_API_BASE_URL=https://casino.biganimetitti.es/api
      - VITE_JWT_ACCESS_TTL=900
      - VITE_APP_NAME=casinoapp
    depends_on:
      - api

  web-admin:
    image: casinoapp-web-admin:latest
    environment:
      - PORT=${WEB_ADMIN_PORT:-5100}
      - VITE_API_BASE_URL=https://casino.biganimetitti.es/api
      - VITE_JWT_ACCESS_TTL=900
      - VITE_APP_NAME=casinoapp-admin
    depends_on:
      - api

  gateway:
    image: caddy:latest
    ports:
      - "80:80"
    environment:
      - API_PORT=${API_PORT:-4000}
      - WEB_PUBLIC_PORT=${WEB_PUBLIC_PORT:-5000}
      - WEB_ADMIN_PORT=${WEB_ADMIN_PORT:-5100}
    depends_on:
      - web-public
      - web-admin
    volumes:
      - ./packages/gateway/Caddyfile:/etc/caddy/Caddyfile

volumes:
  postgres_data:
